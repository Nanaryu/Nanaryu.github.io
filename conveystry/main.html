<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LJMNdustry</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body oncontextmenu="return false">

    <div id="all">
      <!-- canvas injected here by game.js -->

      <div id="ui">

        <br>

        <div id="stats" class="ui">
          &nbsp;
          <div id="mat_internal">

            <div class="mat_count">
              <span id="score" class="ui_text">
                <img src="assets/img/item-titanium.png" class="mat_icon" alt="Titanium">
              </span>
            </div>

            <div class="mat_count">
              <span id="power" class="ui_text">
                <img src="assets/img/power.png" class="mat_icon" alt="Power">
              </span>
            </div>

          </div>
          &nbsp;
        </div>

        <br>

        <div id="select" class="ui"></div>

        <br>

        <div id="item_info" class="ui">
          <div>
            <span class="ui_text" style="font-size: 20px;">Requires: </span>
            <span id="item_requirements" class="ui_text">0</span>
            <img src="assets/img/item-titanium.png" alt="Titanium"
                 style="top: 3px; position: relative; width: 20px; height: 20px;">
          </div>
          <div>
            <span id="item-desc" class="ui_text" style="font-size: 16px;"></span>
          </div>
        </div>

        <br>

        <div id="binds" class="ui">
          E &mdash; Toggle spawn<br>
          R &mdash; Rotate conveyor
        </div>

        <br>

      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
